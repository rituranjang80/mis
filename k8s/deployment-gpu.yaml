# GPU overlay — apply with:
#   kubectl apply -f k8s/namespace.yaml -f k8s/configmap.yaml -f k8s/pvc.yaml
#   kubectl apply -f k8s/deployment-gpu.yaml -f k8s/service.yaml -f k8s/hpa.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: comfyui
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/component: server
    app.kubernetes.io/gpu: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: comfyui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comfyui
        app.kubernetes.io/component: server
        app.kubernetes.io/gpu: "true"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: comfyui
          image: comfyui-local:gpu
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8188
              protocol: TCP
          env:
            - name: COMFYUI_CPU
              value: "0"
            - name: COMFYUI_EXTRA_ARGS
              value: "--preview-method auto --enable-manager"
            - name: COMFYUI_LISTEN
              value: "0.0.0.0"
            - name: COMFYUI_PORT
              value: "8188"
            - name: TQDM_DISABLE
              value: "1"
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: data
              mountPath: /app/input
              subPath: input
            - name: data
              mountPath: /app/output
              subPath: output
            - name: data
              mountPath: /app/user
              subPath: user
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 40
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: comfyui-models
        - name: data
          persistentVolumeClaim:
            claimName: comfyui-data
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
