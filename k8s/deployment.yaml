apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: comfyui
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: comfyui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comfyui
        app.kubernetes.io/component: server
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: comfyui
          image: comfyui-local:cpu
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8188
              protocol: TCP
          envFrom:
            - configMapRef:
                name: comfyui-config
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: data
              mountPath: /app/input
              subPath: input
            - name: data
              mountPath: /app/output
              subPath: output
            - name: data
              mountPath: /app/user
              subPath: user
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: comfyui-models
        - name: data
          persistentVolumeClaim:
            claimName: comfyui-data
